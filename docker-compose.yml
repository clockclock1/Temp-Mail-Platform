version: '3.9'
services:
  backend:
    build:
      context: ./backend
    container_name: tempmail-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    volumes:
      - ./data/backend:/app/data
    ports:
      - "8080:8080"
      - "2525:2525"

  frontend:
    build:
      context: ./frontend
    container_name: tempmail-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8081:80"
