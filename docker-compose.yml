version: '3.9'
services:
  tempmail:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: tempmail
    restart: unless-stopped
    volumes:
      - ./data/backend:/app/data
      - ./config/config.yaml:/app/config/config.yaml
    ports:
      - "8080:8080"
      - "2525:2525"