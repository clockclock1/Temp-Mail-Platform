name: Go Multi-Platform Build

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  release:
    types:
      - published

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          cache: false
      - name: Go test
        working-directory: backend
        run: |
          go mod download
          go test ./...

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
      - name: Build frontend dist
        working-directory: frontend
        run: |
          npm ci
          npm run build
      - name: Upload frontend artifact
        uses: actions/upload-artifact@v6
        with:
          name: frontend-dist
          path: frontend/dist

  build:
    runs-on: ubuntu-latest
    needs:
      - test
      - frontend-build
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: linux
            goarch: arm
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          cache: false
      - name: Download frontend dist
        uses: actions/download-artifact@v7
        with:
          name: frontend-dist
          path: frontend-dist
      - name: Build package (binary + config + web)
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          set -euo pipefail

          mkdir -p backend/dist/package/web
          EXT=""
          if [[ "$GOOS" == "windows" ]]; then EXT=".exe"; fi
          BIN="tempmail${EXT}"

          pushd backend >/dev/null
          go mod download
          GOOS="$GOOS" GOARCH="$GOARCH" CGO_ENABLED="$CGO_ENABLED" go build -trimpath -ldflags "-s -w" -o "dist/package/${BIN}" ./cmd/server
          cp config/config.example.yaml dist/package/config.yaml
          popd >/dev/null

          FRONT_ROOT="frontend-dist"
          if [[ -f "frontend-dist/dist/index.html" ]]; then
            FRONT_ROOT="frontend-dist/dist"
          fi
          cp -r "$FRONT_ROOT"/* backend/dist/package/web/

          (cd backend/dist/package && zip -r "../tempmail-${GOOS}-${GOARCH}.zip" .)
          rm -rf backend/dist/package

      - name: Upload package artifact
        uses: actions/upload-artifact@v6
        with:
          name: tempmail-${{ matrix.goos }}-${{ matrix.goarch }}
          path: backend/dist/tempmail-${{ matrix.goos }}-${{ matrix.goarch }}.zip

  release-assets:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: tempmail-*
          path: release-assets
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          cd release-assets
          sha256sum * > SHA256SUMS.txt

      - name: Upload assets to current release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.event.release.tag_name }}
          REPO: ${{ github.repository }}
        run: |
          gh release upload "$TAG_NAME" release-assets/* --clobber --repo "$REPO"
