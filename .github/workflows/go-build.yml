name: Go Multi-Platform Build

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  release:
    types:
      - published

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          cache: false
      - run: go mod download
      - run: go test ./...

  build:
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: linux
            goarch: arm
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          cache: false
      - run: go mod download
      - name: Build binary
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        shell: bash
        run: |
          mkdir -p dist
          EXT=""
          if [[ "$GOOS" == "windows" ]]; then EXT=".exe"; fi
          BIN="tempmail-${GOOS}-${GOARCH}${EXT}"
          go build -trimpath -ldflags "-s -w" -o "dist/${BIN}" ./cmd/server
      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: tempmail-${{ matrix.goos }}-${{ matrix.goarch }}
          path: backend/dist/*
