name: Go Multi-Platform Build

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  release:
    types:
      - published

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          cache: false
      - run: go mod download
      - run: go test ./...

  build:
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: linux
            goarch: arm
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          cache: false
      - run: go mod download
      - name: Build binary
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        shell: bash
        run: |
          mkdir -p dist
          EXT=""
          if [[ "$GOOS" == "windows" ]]; then EXT=".exe"; fi
          BIN="tempmail-${GOOS}-${GOARCH}${EXT}"
          go build -trimpath -ldflags "-s -w" -o "dist/${BIN}" ./cmd/server
      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: tempmail-${{ matrix.goos }}-${{ matrix.goarch }}
          path: backend/dist/*

  release-assets:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: tempmail-*
          path: release-assets
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          cd release-assets
          sha256sum * > SHA256SUMS.txt

      - name: Upload assets to current release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          gh release upload "$TAG_NAME" release-assets/* --clobber
